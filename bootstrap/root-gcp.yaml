apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-gcp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/elisacoh/weather-gitops.git
    targetRevision: HEAD
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    SyncOptions:
      - CreateNamespace=true
  
