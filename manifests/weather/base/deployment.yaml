apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-app
  namespace: weather
  labels:
    app: weather-app
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: weather-app
  template:
    metadata:
      labels:
        app: weather-app
    spec:
      containers:
        - name: weather-app
          image: elcosah/weather-app:32
          ports:
            - containerPort: 5000
          resources:
            requests: 
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
