apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: weather
  naemspace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/elisacoh/weather-gitops.git
    targetRevision: HEAD
    path: manifests/weather/base
  destination:
    server: https://kubernetes.default.svc
    namespace: weather
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
